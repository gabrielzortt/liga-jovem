<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockMind - Controle de Estoque</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Seu CSS -->
    <link rel="stylesheet" href="estoque.css">
</head>
<body>

    <!-- ========================================= -->
    <!-- TELA DE LOGIN -->
    <!-- ========================================= -->
    <section id="loginScreen" class="login-screen">
        <div class="login-card">

            <div class="brand">
                <div class="brand-icon">
                    <i class="fas fa-boxes-stacked"></i>
                </div>

                <div>
                    <h1>StockMind</h1>
                    <p>Controle de Estoque</p>
                </div>
            </div>

            <div class="input-group">
                <label for="loginUser">Usuário</label>
                <input
                    type="text"
                    id="loginUser"
                    placeholder="Digite seu usuário"
                >
            </div>

            <div class="input-group">
                <label for="loginPass">Senha</label>
                <input
                    type="password"
                    id="loginPass"
                    placeholder="Digite sua senha"
                >
            </div>

            <button class="btn btn-primary" onclick="login()">
                Entrar
            </button>

            <div id="loginError" class="error"></div>

            <div class="login-hint">
                Usuário: <strong>admin</strong> |
                Senha: <strong>senha</strong>
            </div>
        </div>
    </section>

    <!-- ========================================= -->
    <!-- APLICAÇÃO -->
    <!-- ========================================= -->
    <section id="app" class="app hidden">

        <!-- TOPO -->
        <header class="topbar">
            <div>
                <h2>Controle de Estoque</h2>
                <p>Cadastro, alertas, filtros e histórico local.</p>
            </div>

            <div class="actions">
                <button class="btn btn-secondary" onclick="exportData()">
                    <i class="fas fa-file-export"></i>
                    Exportar JSON
                </button>

                <button class="btn btn-danger" onclick="logout()">
                    <i class="fas fa-right-from-bracket"></i>
                    Sair
                </button>
            </div>
        </header>

        <!-- CARDS DE ESTATÍSTICAS -->
        <section class="stats">
            <div class="card">
                <div class="stat-label">Total de Produtos</div>
                <div class="stat-value" id="statTotal">0</div>
            </div>

            <div class="card">
                <div class="stat-label">Abaixo do Mínimo</div>
                <div class="stat-value" id="statLow">0</div>
            </div>

            <div class="card">
                <div class="stat-label">Próximos do Vencimento</div>
                <div class="stat-value" id="statExpiry">0</div>
            </div>

            <div class="card">
                <div class="stat-label">Valor do Estoque</div>
                <div class="stat-value" id="statValue">R$ 0,00</div>
            </div>
        </section>

        <!-- CONTEÚDO PRINCIPAL -->
        <section class="layout">

            <!-- FORMULÁRIO -->
            <div class="card">
                <h3 class="section-title">Cadastro de Produto</h3>

                <div class="form-grid">

                    <input type="hidden" id="productId">

                    <input
                        type="text"
                        id="name"
                        placeholder="Nome do produto"
                    >

                    <div class="two-cols">
                        <input
                            type="text"
                            id="category"
                            placeholder="Categoria"
                        >

                        <input
                            type="text"
                            id="barcode"
                            placeholder="Código de barras"
                        >
                    </div>

                    <div class="two-cols">
                        <input
                            type="text"
                            id="supplier"
                            placeholder="Fornecedor"
                        >

                        <input
                            type="date"
                            id="expiry"
                        >
                    </div>

                    <div class="two-cols">
                        <input
                            type="number"
                            id="quantity"
                            min="0"
                            placeholder="Quantidade"
                        >

                        <input
                            type="number"
                            id="minStock"
                            min="0"
                            placeholder="Estoque mínimo"
                        >
                    </div>

                    <div class="two-cols">
                        <input
                            type="number"
                            id="cost"
                            min="0"
                            step="0.01"
                            placeholder="Custo unitário"
                        >

                        <input
                            type="number"
                            id="price"
                            min="0"
                            step="0.01"
                            placeholder="Preço de venda"
                        >
                    </div>

                    <button
                        class="btn btn-success"
                        onclick="saveProduct()"
                    >
                        <i class="fas fa-floppy-disk"></i>
                        Salvar Produto
                    </button>
                </div>

                <!-- ALERTAS -->
                <div id="alerts" class="alert-list"></div>
            </div>

            <!-- LISTA DE PRODUTOS -->
            <div class="card">
                <div class="toolbar">

                    <input
                        type="text"
                        id="search"
                        placeholder="Pesquisar por nome, categoria ou fornecedor"
                    >

                    <select id="filterStatus">
                        <option value="all">Todos</option>
                        <option value="low">Abaixo do mínimo</option>
                        <option value="expired">Vencendo em 30 dias</option>
                    </select>
                </div>

                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Produto</th>
                                <th>Qtd</th>
                                <th>Status</th>
                                <th>Fornecedor</th>
                                <th>Valor</th>
                                <th>Ações</th>
                            </tr>
                        </thead>

                        <tbody id="productTable">
                            <!-- Preenchido pelo JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </section>

    <!-- Seu JavaScript -->
    <script src="estoque.js"></script>
</body>
</html>
